# ========== 基础配置 ==========
# 监听所有网络接口（允许外网访问）
bind 0.0.0.0

# 端口
port 6379

# 关闭保护模式（允许外网访问）
protected-mode no

# 密码认证
requirepass root

# ========== 持久化配置 ==========
# RDB 持久化
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ========== 日志配置 ==========
logfile /var/log/redis/redis.log
loglevel notice

# ========== 性能优化 ==========
# 最大内存限制（根据实际情况调整）
maxmemory 256mb
maxmemory-policy allkeys-lru

# TCP 相关
tcp-backlog 511
tcp-keepalive 300
timeout 0

# 数据库数量
databases 16
