services:
  seata-server:
    image: seataio/seata-server:2.0.0
    container_name: seata-server
    restart: unless-stopped
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./application.yml:/seata-server/resources/application.yml
    networks:
      - my-custom-network
    #depends_on:
    #  - nacos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7091/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  my-custom-network:
    external: true
    name: my-custom-network