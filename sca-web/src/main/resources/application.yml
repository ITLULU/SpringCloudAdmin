server:
  port: 8080


spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://47.116.45.17:${mysql.port}/sca_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${mysql.user}
    password: ${mysql.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: ASSIGN_ID
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 安全配置
security:
  jwt:
    secret: SpringCloudAdmin-Secret-Key-2024-Must-Be-At-Least-32-Chars
    expiration: 86400000  # AccessToken过期时间：24小时（毫秒）
  # Token续期策略配置
  renewal:
    # 续期模式：none(不续期) / refresh-token(双Token) / sliding-window(滑动窗口)
    mode: none
    # RefreshToken过期时间：1天（毫秒），仅refresh-token模式生效
    refresh-token-expiration: 86400000
    # 滑动窗口阈值：0.33表示剩余不足1/3时自动续期，仅sliding-window模式生效
    sliding-window-threshold: 0.33
  # 放行路径配置（不需要登录即可访问的接口）
  permit-urls:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /api/hotel/list
    - /api/hotel/*
    - /api/hotel/product/list
    - /api/hotel/product/*
    - /api/health
    - /actuator/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /error

# 开发环境日志配置
logging:
  level:
    # Feign调用日志（BASIC级别：请求方法/URL/响应状态码/耗时）
    com.opensabre.admin.rpc.client: DEBUG
    # Feign内部日志引擎
    feign: DEBUG

# Seata 分布式事务配置（启用时取消注释）
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: default_tx_group
  service:
    vgroup-mapping:
      default_tx_group: default
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: 47.116.45.17:8848
      group: SEATA_GROUP
      username: ${nacos.username}
      password: ${nacos.password}
  config:
    type: nacos
    nacos:
      server-addr: 47.116.45.17:8848
      group: SEATA_GROUP
      data-id: seataServer.properties
      username: ${nacos.username}
      password: ${nacos.password}
