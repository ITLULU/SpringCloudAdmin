server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://192.168.235.128:3306/sca_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: ASSIGN_ID
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 安全配置
security:
  jwt:
    secret: SpringCloudAdmin-Secret-Key-2024-Must-Be-At-Least-32-Chars
    expiration: 86400000  # 24小时（毫秒）
  # 放行路径配置（不需要登录即可访问的接口）
  permit-urls:
    - /api/auth/login
    - /api/health
    - /actuator/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /error
